<p><b>I</b></p>
<p>Faire naître la haine de par leur propre fait,</p>
<p>but des calomniateurs, est peu suivi d’effet.</p>
<p>Par leur méchanceté les cœurs sont mieux noués :</p>
<p>loin du but poursuivi, inconscient, l’ennemi</p>
<p>prépare l’avenir,</p>
<p>et le sort des amants est heureux en ceci !</p>
