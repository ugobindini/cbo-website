<p><b>I</b></p>
<p>Crucifigat omnes  Domini crux altera </p>
<p>nova Christi vulnera </p>
<p>arbor salutifera </p>
<p>perditur sepulchrum  gens evertit extera </p>
<p>violenta  plena gente </p>
<p>sola sedet civitas </p>
<p>agni fedus  rumpit hedus </p>
<p>plorat dotes perditas </p>
<p>Sponsa Syon immolatur </p>
<p>Ananias incurvatur </p>
<p>cornu gelu flagellatur  mundus </p>
